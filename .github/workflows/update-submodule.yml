name: Sync Univers42 Submodules

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch: # Allow manual trigger from the Actions tab

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      # ── 1. Checkout
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true
          submodules: false

      # ── 2. Git identity + rewrite SSH → HTTPS
      - name: Configure Git identity and fix SSH URLs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Global URL rewrite: intercept ANY SSH URL and transparently
          # convert it to HTTPS — belt-and-suspenders safety net
          git config --global url."https://github.com/".insteadOf "git@github.com:"

          # Rewrite SSH URLs inside .gitmodules so the fix is persisted
          # in the committed file (not just for this runner session)
          if grep -q 'git@github.com:' .gitmodules 2>/dev/null; then
            echo "Rewriting SSH URLs → HTTPS in .gitmodules..."
            sed -i 's|git@github.com:|https://github.com/|g' .gitmodules
          fi

          # Init root-level submodules so URLs from .gitmodules get written
          # to .git/config, THEN sync to propagate the rewritten HTTPS URLs
          root_subs=$(git config --file .gitmodules \
                          --get-regexp 'submodule\..*\.path' \
                      | awk '{print $2}' | grep -v '/' || true)

          for sub in $root_subs; do
            git submodule init -- "$sub" 2>/dev/null || true
          done

          git submodule sync
          echo "All submodule URLs synced to HTTPS."

      # ── 3. Discover & add new public repos as submodules
      - name: Discover and add new Univers42 public repos
        run: |
          set -euo pipefail

          echo "Fetching public repos from Univers42..."
          repos=$(gh repo list Univers42 --visibility=public --no-archived --limit 200 \
                  --json name --jq '.[].name' | sort)

          # Build a list of repo names already tracked as submodules
          existing_repos=""
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            url=$(echo "$line" | awk '{print $2}')
            repo_name=$(basename "$url" .git)
            existing_repos="${existing_repos} ${repo_name}"
          done < <(git config --file .gitmodules \
                       --get-regexp 'submodule\..*\.url' 2>/dev/null || true)

          echo "Already tracked repos:${existing_repos}"
          echo ""

          added=0
          for repo in $repos; do
            # Never add the showcase repo itself as its own submodule
            [[ "$repo" == "Universe42" ]] && continue

            # Skip repos already tracked (case-insensitive)
            if echo "$existing_repos" | grep -qiw "$repo"; then
              echo "${repo} — already tracked"
              continue
            fi

            # Skip if a directory with that name already exists
            if [ -d "$repo" ]; then
              echo "${repo} — directory exists but is not a submodule, skipping"
              continue
            fi

            # Skip empty repos (no default branch = no commits at all)
            default_branch=$(gh repo view "Univers42/${repo}" --json defaultBranchRef --jq '.defaultBranchRef.name' 2>/dev/null || true)
            if [ -z "$default_branch" ]; then
              echo "${repo} — empty repo (no commits), skipping"
              continue
            fi

            echo "Adding submodule: ${repo}"
            if git submodule add --depth 1 \
              "https://github.com/Univers42/${repo}.git" "${repo}" 2>&1; then
              added=$((added + 1))
            else
              echo "Failed to add ${repo} (empty/broken repo?), cleaning up"
              # Remove leftover directory
              rm -rf "${repo}"
              # Remove from .gitmodules if it was partially added
              git config --file .gitmodules --remove-section "submodule.${repo}" 2>/dev/null || true
              # Remove from index
              git rm --cached "${repo}" 2>/dev/null || true
              continue
            fi
          done

          echo ""
          echo "New submodules added: ${added}"

      # ── 4. Update root-level submodules only (depth=1, NO recursion)
      - name: Update root-level submodules (no recursion)
        run: |
          set -euo pipefail

          echo "Updating root-level submodules..."

          # Select only submodule paths that live directly at the repo root
          # (paths without '/' are depth-1 directories)
          root_subs=$(git config --file .gitmodules \
                          --get-regexp 'submodule\..*\.path' \
                      | awk '{print $2}' | grep -v '/' || true)

          if [ -z "$root_subs" ]; then
            echo "No root-level submodules found."
            exit 0
          fi

          for sub in $root_subs; do
            echo "  ↻ ${sub}"
            git submodule init   -- "$sub" 2>/dev/null || true
            git submodule update --remote --depth 1 -- "$sub" || {
              echo "Failed to update ${sub}"
            }
          done

          echo "Root-level submodules updated."

      # ── 5. Commit & push
      - name: Commit and push changes
        run: |
          # Stage .gitmodules first (always safe)
          git add .gitmodules 2>/dev/null || true

          # Stage each root-level submodule individually, skip broken ones
          root_subs=$(git config --file .gitmodules \
                          --get-regexp 'submodule\..*\.path' \
                      | awk '{print $2}' | grep -v '/' || true)

          for sub in $root_subs; do
            if [ -d "$sub" ] && ([ -f "$sub/.git" ] || [ -d "$sub/.git" ]); then
              git add "$sub" 2>/dev/null || echo "Skipped staging ${sub} (no commit checked out)"
            fi
          done

          if ! git diff --cached --quiet; then
            timestamp=$(date -u +"%Y-%m-%d %H:%M UTC")
            git commit -m "chore: sync Univers42 submodules [${timestamp}]"
            git push
            echo "Changes committed and pushed."
          else
            echo "Everything is up to date — nothing to push."
          fi

